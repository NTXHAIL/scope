const DEFAULT_LABOR_RATE = 60;

const DENT_SIZES = ["DIME", "NICKEL", "QUARTER", "HALF"];

function lookupPrice(panel, count, size) {
  if (!count || count <= 0) return 0;
  const rows = PRICING_MATRIX[panel];
  if (!rows) return 0;
  for (const row of rows) {
    if (count >= row.min && count <= row.max) {
      return row[size] || 0;
    }
  }
  return 0;
}

function getMaxCount(panel) {
  const rows = PRICING_MATRIX[panel];
  if (!rows || rows.length === 0) return 0;
  return rows[rows.length - 1].max;
}

function CarSilhouette({ panelData, selectedPanel, onSelectPanel }) {
  const panelPaths = {
    HOOD: { d: "M155,45 C155,30 185,15 210,12 C235,15 265,30 265,45 L265,115 C265,120 260,125 255,125 L165,125 C160,125 155,120 155,115 Z", cx: 210, cy: 70 },
    LFF: { d: "M100,35 L150,20 L150,125 L100,110 Z", cx: 120, cy: 72 },
    RFF: { d: "M270,20 L320,35 L320,110 L270,125 Z", cx: 300, cy: 72 },
    LFD: { d: "M95,118 L148,128 L148,250 L95,240 Z", cx: 118, cy: 184 },
    RFD: { d: "M272,128 L325,118 L325,240 L272,250 Z", cx: 302, cy: 184 },
    LRAIL: { d: "M148,140 L175,140 L175,310 L148,310 Z", cx: 162, cy: 225 },
    RRAIL: { d: "M245,140 L272,140 L272,310 L245,310 Z", cx: 258, cy: 225 },
    ROOF: { d: "M175,130 L245,130 L250,145 L250,300 L245,315 L175,315 L170,300 L170,145 Z", cx: 210, cy: 222 },
    LRD: { d: "M95,248 L148,258 L148,370 L95,355 Z", cx: 118, cy: 310 },
    RRD: { d: "M272,258 L325,248 L325,355 L272,370 Z", cx: 302, cy: 310 },
    LQ: { d: "M100,362 L150,375 L150,430 L120,440 L100,430 Z", cx: 122, cy: 400 },
    RQ: { d: "M270,375 L320,362 L320,430 L300,440 L270,430 Z", cx: 298, cy: 400 },
    TRUNK: { d: "M155,400 L265,400 L265,445 C265,460 255,470 240,475 L180,475 C165,470 155,460 155,445 Z", cx: 210, cy: 438 },
  };

  const getHeat = (panel) => {
    const d = panelData[panel];
    if (!d || !d.count || d.count <= 0) return 0;
    const max = getMaxCount(panel);
    return Math.min(d.count / (max || 50), 1);
  };

  const getColor = (panel) => {
    const d = panelData[panel];
    if (d && d.rrEnabled) return "rgba(239,68,68,0.5)";
    if (d && d.convEnabled) return "rgba(251,146,60,0.5)";
    const heat = getHeat(panel);
    if (heat <= 0) return "rgba(200,210,220,0.3)";
    if (heat < 0.25) return "rgba(52,211,153,0.55)";
    if (heat < 0.5) return "rgba(251,191,36,0.6)";
    if (heat < 0.75) return "rgba(251,146,60,0.7)";
    return "rgba(239,68,68,0.75)";
  };

  return (
    <svg viewBox="60 0 300 490" style={{ width: "100%", maxWidth: 340, margin: "0 auto", display: "block" }}>
      {/* Car body outline */}
      <path d="M130,15 C160,5 260,5 290,15 L325,35 C340,60 340,80 335,110 L335,430 C335,455 320,475 290,480 L240,488 C225,490 195,490 180,488 L130,480 C100,475 85,455 85,430 L85,110 C80,80 80,60 95,35 Z"
        fill="none" stroke="#3a4555" strokeWidth="3.5" />
      {/* Windshield */}
      <path d="M155,125 L265,125 L272,140 L272,150 L148,150 L148,140 Z" fill="rgba(140,170,200,0.25)" stroke="#4a5568" strokeWidth="1" />
      {/* Rear window */}
      <path d="M155,375 L265,375 L268,390 L152,390 Z" fill="rgba(140,170,200,0.25)" stroke="#4a5568" strokeWidth="1" />

      {Object.entries(panelPaths).map(([key, { d, cx, cy }]) => {
        const isSelected = selectedPanel === key;
        const hasData = panelData[key] && (panelData[key].count > 0 || panelData[key].rrEnabled || panelData[key].convEnabled);
        return (
          <g key={key} onClick={() => onSelectPanel(key)} style={{ cursor: "pointer" }}>
            <path d={d}
              fill={getColor(key)}
              stroke={isSelected ? "#f59e0b" : hasData ? "#64748b" : "#94a3b8"}
              strokeWidth={isSelected ? 2.5 : 1}
              style={{ transition: "all 0.2s" }}
            />
            {hasData && (
              <>
                <circle cx={cx} cy={cy} r={14} fill="rgba(15,23,42,0.85)" />
                <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="central"
                  fill={panelData[key].rrEnabled ? "#ef4444" : panelData[key].convEnabled ? "#fb923c" : "#f59e0b"} fontSize={panelData[key].rrEnabled ? "8" : panelData[key].convEnabled ? "7" : "11"} fontWeight="700" fontFamily="monospace">
                  {panelData[key].rrEnabled ? "R&R" : panelData[key].convEnabled ? "CONV" : panelData[key].count}
                </text>
              </>
            )}
            {!hasData && (
              <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                fill="#64748b" fontSize="8" fontWeight="500" fontFamily="sans-serif" style={{pointerEvents:"none"}}>
                {key}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// ─── PANEL EDITOR MODAL ─────────────────────────────────────────────────────
function PanelEditor({ panel, data, onSave, onClose, onDelete }) {
  const [selectedRange, setSelectedRange] = useState(data?.selectedRange || null);
  const [size, setSize] = useState(data?.size || "DIME");
  const [addons, setAddons] = useState(data?.addons || []);
  const [osDentCount, setOsDentCount] = useState(data?.osDentCount || 0);
  const [doubleOsCount, setDoubleOsCount] = useState(data?.doubleOsCount || 0);
  const [rrEnabled, setRrEnabled] = useState(data?.rrEnabled || false);
  const [rrHours, setRrHours] = useState(data?.rrHours ?? 0);
  const [convEnabled, setConvEnabled] = useState(data?.convEnabled || false);
  const [convHours, setConvHours] = useState(data?.convHours ?? 0);
  const [riEnabled, setRiEnabled] = useState(data?.riEnabled || false);
  const [laborRate, setLaborRate] = useState(data?.laborRate ?? DEFAULT_LABOR_RATE);

  // Initialize R&I operation times from saved data or defaults
  const defaultOps = (RI_OPERATIONS[panel] || []);
  const initTimes = () => {
    const saved = data?.riTimes || {};
    const t = {};
    defaultOps.forEach(op => { t[op.id] = saved[op.id] ?? op.time; });
    return t;
  };
  const [riTimes, setRiTimes] = useState(initTimes);
  const [riIncluded, setRiIncluded] = useState(() => {
    if (data?.riIncluded) return data.riIncluded;
    const inc = {};
    defaultOps.forEach(op => { inc[op.id] = false; });
    return inc;
  });
  // Per-operation R&R toggle (for ops with rrOption flag)
  const [riRr, setRiRr] = useState(() => {
    if (data?.riRr) return data.riRr;
    const rr = {};
    defaultOps.forEach(op => { rr[op.id] = false; });
    return rr;
  });

  const updateRiTime = (id, delta) => {
    setRiTimes(prev => ({ ...prev, [id]: Math.max(0, parseFloat((prev[id] + delta).toFixed(1))) }));
  };
  const toggleRiOp = (id) => {
    setRiIncluded(prev => ({ ...prev, [id]: !prev[id] }));
  };
  const toggleRiRr = (id) => {
    setRiRr(prev => ({ ...prev, [id]: !prev[id] }));
  };

  // R&I total calculation
  const riTotalHours = riEnabled ? defaultOps.reduce((s, op) => s + (riIncluded[op.id] ? (riTimes[op.id] || 0) : 0), 0) : 0;
  const riTotalCost = Math.round(riTotalHours * laborRate * 100) / 100;

  const rows = PRICING_MATRIX[panel] || [];
  // Filter ranges that have pricing > 0 for at least one size
  const availableRanges = rows.filter(r => r.DIME > 0 || r.NICKEL > 0 || r.QUARTER > 0 || r.HALF > 0);
  const selectedRangeIdx = selectedRange ? availableRanges.findIndex(r => r.range === selectedRange) : -1;

  const toggleAddon = (name) => {
    setAddons(prev => prev.includes(name) ? [] : [name]);
  };

  // Get the selected row from the matrix
  const selectedRow = selectedRange ? rows.find(r => r.range === selectedRange) : null;
  const basePrice = selectedRow ? (selectedRow[size] || 0) : 0;
  const count = selectedRow ? selectedRow.max : 0; // use max of range for heat map display

  // Available sizes for the selected range (price > 0)
  const availableSizes = DENT_SIZES.filter(s => {
    if (selectedRow) return selectedRow[s] > 0;
    return rows.some(r => r[s] > 0);
  });

  const addonBreakdown = addons.map(name => {
    const a = ADDONS.find(x => x.name === name);
    if (!a) return { name, amount: 0 };
    if (a.type === "dollar") {
      if (name === "Oversized Dent") return { name, amount: a.value * osDentCount };
      if (name === "Double OS Dents") return { name, amount: a.value * doubleOsCount };
      return { name, amount: a.value };
    }
    return { name, amount: Math.round(basePrice * a.value) };
  });
  const addonTotal = addonBreakdown.reduce((s, a) => s + a.amount, 0);
  const nonPdr = rrEnabled || convEnabled;
  const rrCost = rrEnabled ? Math.round(rrHours * laborRate * 100) / 100 : 0;
  const convCost = convEnabled ? Math.round(convHours * laborRate * 100) / 100 : 0;
  const pdrTotal = nonPdr ? 0 : (basePrice + addonTotal);
  const totalPrice = pdrTotal + rrCost + convCost + riTotalCost;

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalContent} onClick={e => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <div>
            <div style={styles.modalTitle}>{PANEL_LABELS[panel]}</div>
            <div style={styles.modalSubtitle}>{panel} • {availableRanges.length} damage ranges</div>
          </div>
          <button onClick={onClose} style={styles.closeBtn}>✕</button>
        </div>

        <div style={styles.modalBody}>
          {/* Repair Mode Toggles */}
          <div style={styles.repairToggles}>
            <button onClick={() => { setRrEnabled(v => !v); if (!rrEnabled) setConvEnabled(false); }}
              style={{ ...styles.repairToggleBtn, ...(rrEnabled ? styles.repairToggleBtnRR : {}) }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
              </svg>
              <span>R&R</span>
            </button>
            <button onClick={() => { setConvEnabled(v => !v); if (!convEnabled) setRrEnabled(false); }}
              style={{ ...styles.repairToggleBtn, ...(convEnabled ? styles.repairToggleBtnConv : {}) }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
              </svg>
              <span>Conventional</span>
            </button>
          </div>

          {/* PDR Sections — hidden when R&R or Conventional is enabled */}
          {!nonPdr && (
            <>
          {/* Dent Count Range Selector */}
          <label style={styles.fieldLabel}>DENT COUNT RANGE</label>
          <div style={styles.rangeNavRow}>
            <button
              style={{ ...styles.rangeArrow, opacity: selectedRangeIdx > 0 ? 1 : 0.25 }}
              onClick={() => {
                if (selectedRangeIdx > 0) setSelectedRange(availableRanges[selectedRangeIdx - 1].range);
              }}
              disabled={selectedRangeIdx <= 0}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div style={{
              ...styles.rangeDisplay,
              ...(selectedRow && selectedRow[size] === 0 ? styles.rangeDisplayInvalid : {}),
            }}>
              {selectedRange ? (
                <>
                  <div style={{
                    ...styles.rangeDisplayCount,
                    ...(selectedRow && selectedRow[size] === 0 ? { color: "#ef4444" } : {}),
                  }}>{selectedRange}</div>
                  <div style={{
                    ...styles.rangeDisplayLabel,
                    ...(selectedRow && selectedRow[size] === 0 ? { color: "#b91c1c" } : {}),
                  }}>dents</div>
                </>
              ) : (
                <div style={styles.rangeDisplayPlaceholder}>Select range</div>
              )}
            </div>
            <button
              style={{ ...styles.rangeArrow, opacity: selectedRangeIdx < availableRanges.length - 1 ? 1 : 0.25 }}
              onClick={() => {
                if (selectedRangeIdx < availableRanges.length - 1) setSelectedRange(availableRanges[selectedRangeIdx + 1].range);
              }}
              disabled={selectedRangeIdx >= availableRanges.length - 1}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          {/* Range step indicator */}
          <div style={styles.rangeSteps}>
            {availableRanges.map((r, i) => {
              const isActive = selectedRange === r.range;
              const isPast = i < selectedRangeIdx;
              const isInvalid = r[size] === 0;
              return (
                <button key={r.range} onClick={() => setSelectedRange(r.range)}
                  style={{
                    ...styles.rangeStep,
                    ...(isActive ? styles.rangeStepActive : {}),
                    ...(isPast && !isInvalid ? styles.rangeStepPast : {}),
                  }}>
                  <div style={{
                    ...styles.rangeStepDot,
                    ...(isActive && !isInvalid ? { background: "#f59e0b", borderColor: "#f59e0b", boxShadow: "0 0 8px rgba(245,158,11,0.5)", transform: "scale(1.3)" } : {}),
                    ...(isActive && isInvalid ? { background: "#ef4444", borderColor: "#ef4444", boxShadow: "0 0 8px rgba(239,68,68,0.5)", transform: "scale(1.3)" } : {}),
                    ...(isPast && !isInvalid ? { background: "rgba(245,158,11,0.4)", borderColor: "rgba(245,158,11,0.5)" } : {}),
                    ...(isInvalid && !isActive ? { background: "rgba(239,68,68,0.3)", borderColor: "rgba(239,68,68,0.4)" } : {}),
                  }} />
                  {/* Connector line */}
                  {i < availableRanges.length - 1 && (
                    <div style={{
                      position: "absolute", top: 9, left: "55%", right: "-45%", height: 2,
                      background: isPast ? "rgba(245,158,11,0.35)" : "rgba(148,163,184,0.15)",
                      zIndex: 0,
                    }} />
                  )}
                  <div style={{
                    ...styles.rangeStepText,
                    ...(isActive && !isInvalid ? { color: "#f59e0b" } : {}),
                    ...(isActive && isInvalid ? { color: "#ef4444" } : {}),
                    ...(isInvalid && !isActive ? { color: "#ef4444", opacity: 0.6 } : {}),
                  }}>{r.range}</div>
                </button>
              );
            })}
          </div>

          {/* Dent Size */}
          <label style={{ ...styles.fieldLabel, marginTop: 22 }}>DENT SIZE</label>
          <div style={styles.sizeGrid}>
            {DENT_SIZES.map(s => {
              const hasAnyPrice = rows.some(r => r[s] > 0);
              const isAvailable = selectedRow ? selectedRow[s] > 0 : hasAnyPrice;
              const priceForSize = selectedRow ? selectedRow[s] : 0;
              const isSelectedInvalid = size === s && selectedRow && selectedRow[s] === 0;
              return (
                <button key={s} onClick={() => hasAnyPrice && setSize(s)}
                  style={{
                    ...styles.sizeBtn,
                    ...(size === s && isAvailable ? styles.sizeBtnActive : {}),
                    ...(isSelectedInvalid ? styles.sizeBtnRed : {}),
                    ...(!hasAnyPrice ? styles.sizeBtnDisabled : {}),
                    ...(!isAvailable && hasAnyPrice && size !== s ? styles.sizeBtnWarn : {}),
                  }}>
                  <div>{DENT_SIZE_LABELS[s]}</div>
                  {selectedRow && isAvailable && (
                    <div style={{ fontSize: 11, marginTop: 2, opacity: 0.7 }}>${priceForSize}</div>
                  )}
                  {selectedRow && !isAvailable && (
                    <div style={{ fontSize: 9, marginTop: 2, color: "#ef4444", fontWeight: 600 }}>R&R</div>
                  )}
                  {!selectedRow && !hasAnyPrice && <div style={{ fontSize: 10, marginTop: 2, opacity: 0.5 }}>N/A</div>}
                </button>
              );
            })}
          </div>

          {/* Conventional / R&R Warning */}
          {selectedRange && basePrice === 0 && selectedRow && (
            <div style={styles.rrWarning}>
              <div style={styles.rrWarningIcon}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round">
                  <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
                  <line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
              </div>
              <div>
                <div style={styles.rrWarningTitle}>Conventional or R&R Recommended</div>
                <div style={styles.rrWarningText}>
                  The {DENT_SIZE_LABELS[size].toLowerCase()}-size dent at {selectedRange} count exceeds the PDR matrix for this panel. Conventional repair or Remove & Replace is recommended.
                </div>
              </div>
            </div>
          )}

          {selectedRange && basePrice > 0 && (
            <div style={styles.priceTag}>Base: ${basePrice.toLocaleString()}</div>
          )}

          {/* Addons */}
          <label style={styles.fieldLabel}>ADD-ONS</label>
          <div style={styles.addonGrid}>
            {ADDONS.map(a => {
              const isActive = addons.includes(a.name);
              const isDollarQty = a.name === "Oversized Dent" || a.name === "Double OS Dents";
              const showStepper = isDollarQty && isActive;
              return (
                <div key={a.name} style={{ marginBottom: 6 }}>
                  <button onClick={() => toggleAddon(a.name)}
                    style={{ ...styles.addonBtn, ...(isActive ? styles.addonBtnActive : {}) }}>
                    <span style={styles.addonName}>{a.name}</span>
                    <span style={{ ...styles.addonVal, ...(isActive ? styles.addonValActive : {}) }}>
                      {a.type === "dollar" ? `$${a.value}/ea` : `+${(a.value * 100)}%`}
                    </span>
                  </button>
                  {showStepper && (
                    <div style={styles.osDentRow}>
                      <span style={styles.osDentLabel}>{a.name === "Oversized Dent" ? "OS Dents" : "Dbl OS"} Qty:</span>
                      <div style={styles.osStepper}>
                        <button style={styles.osStepBtn} onClick={(e) => {
                          e.stopPropagation();
                          if (a.name === "Oversized Dent") setOsDentCount(c => Math.max(0, c - 1));
                          else setDoubleOsCount(c => Math.max(0, c - 1));
                        }}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <div style={styles.osStepValue}>
                          {a.name === "Oversized Dent" ? osDentCount : doubleOsCount}
                        </div>
                        <button style={styles.osStepBtn} onClick={(e) => {
                          e.stopPropagation();
                          if (a.name === "Oversized Dent") setOsDentCount(c => c + 1);
                          else setDoubleOsCount(c => c + 1);
                        }}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                      </div>
                      <span style={styles.osStepTotal}>
                        ${((a.name === "Oversized Dent" ? osDentCount : doubleOsCount) * a.value).toLocaleString()}
                      </span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
            </>
          )}

          {/* R&R — labor hours */}
          {rrEnabled && (
            <div style={styles.rrPanel}>
              <div style={styles.rrPanelHeader}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round">
                  <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/>
                  <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
                </svg>
                <div>
                  <div style={styles.rrPanelTitle}>Remove & Replace</div>
                  <div style={styles.rrPanelSub}>Full panel replacement — set labor hours</div>
                </div>
              </div>
              <div style={styles.rrRow}>
                <span style={styles.rrRowLabel}>Labor Rate</span>
                <div style={styles.osStepper}>
                  <button style={styles.osStepBtn} onClick={() => setLaborRate(r => Math.max(0, parseFloat((r - 1).toFixed(2))))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                  <div style={styles.rrRateValue}>${laborRate.toFixed(2)}</div>
                  <button style={styles.osStepBtn} onClick={() => setLaborRate(r => parseFloat((r + 1).toFixed(2)))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                </div>
                <span style={styles.rrUnit}>/hr</span>
              </div>
              <div style={styles.rrRow}>
                <span style={styles.rrRowLabel}>Labor Hours</span>
                <div style={styles.osStepper}>
                  <button style={styles.osStepBtn} onClick={() => setRrHours(h => Math.max(0, parseFloat((h - 1).toFixed(1))))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                  <div style={styles.rrHoursValue}>{rrHours.toFixed(1)}</div>
                  <button style={styles.osStepBtn} onClick={() => setRrHours(h => parseFloat((h + 1).toFixed(1)))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                </div>
                <span style={styles.rrUnit}>hrs</span>
              </div>
              {rrCost > 0 && (
                <div style={styles.rrSubtotal}>
                  <span>R&R Total ({rrHours.toFixed(1)} hrs × ${laborRate.toFixed(2)})</span>
                  <span style={styles.rrSubtotalVal}>${rrCost.toFixed(2)}</span>
                </div>
              )}
            </div>
          )}

          {/* Conventional Repair — labor hours */}
          {convEnabled && (
            <div style={{ ...styles.rrPanel, background: "rgba(251,146,60,0.05)", borderColor: "rgba(251,146,60,0.15)" }}>
              <div style={{ ...styles.rrPanelHeader, borderColor: "rgba(251,146,60,0.1)" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fb923c" strokeWidth="2" strokeLinecap="round">
                  <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                <div>
                  <div style={{ ...styles.rrPanelTitle, color: "#fb923c" }}>Conventional Repair</div>
                  <div style={styles.rrPanelSub}>Body work repair — set labor hours</div>
                </div>
              </div>
              <div style={styles.rrRow}>
                <span style={styles.rrRowLabel}>Labor Rate</span>
                <div style={styles.osStepper}>
                  <button style={styles.osStepBtn} onClick={() => setLaborRate(r => Math.max(0, parseFloat((r - 1).toFixed(2))))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                  <div style={{ ...styles.rrRateValue, color: "#fb923c" }}>${laborRate.toFixed(2)}</div>
                  <button style={styles.osStepBtn} onClick={() => setLaborRate(r => parseFloat((r + 1).toFixed(2)))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                </div>
                <span style={styles.rrUnit}>/hr</span>
              </div>
              <div style={styles.rrRow}>
                <span style={styles.rrRowLabel}>Labor Hours</span>
                <div style={styles.osStepper}>
                  <button style={styles.osStepBtn} onClick={() => setConvHours(h => Math.max(0, parseFloat((h - 1).toFixed(1))))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                  <div style={styles.rrHoursValue}>{convHours.toFixed(1)}</div>
                  <button style={styles.osStepBtn} onClick={() => setConvHours(h => parseFloat((h + 1).toFixed(1)))}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  </button>
                </div>
                <span style={styles.rrUnit}>hrs</span>
              </div>
              {convCost > 0 && (
                <div style={{ ...styles.rrSubtotal, borderColor: "rgba(251,146,60,0.12)" }}>
                  <span>Conv. Total ({convHours.toFixed(1)} hrs × ${laborRate.toFixed(2)})</span>
                  <span style={{ ...styles.rrSubtotalVal, color: "#fb923c" }}>${convCost.toFixed(2)}</span>
                </div>
              )}
            </div>
          )}

          {/* R&I Operations */}
          {defaultOps.length > 0 && (
            <>
              <label style={styles.fieldLabel}>R&I OPERATIONS</label>
              {/* R&I toggle */}
              <button onClick={() => setRiEnabled(v => !v)}
                style={{ ...styles.addonBtn, ...(riEnabled ? styles.riToggleActive : {}), marginBottom: 10 }}>
                <span style={styles.addonName}>R&I — Remove & Install</span>
                <span style={{ ...styles.addonVal, ...(riEnabled ? styles.addonValActive : {}) }}>
                  {riEnabled ? "ON" : "OFF"}
                </span>
              </button>

              {riEnabled && (
                <div style={styles.riSection}>
                  {/* Labor Rate */}
                  <div style={styles.riLaborRow}>
                    <span style={styles.riLaborLabel}>Labor Rate</span>
                    <div style={styles.osStepper}>
                      <button style={styles.osStepBtn} onClick={() => setLaborRate(r => Math.max(0, parseFloat((r - 0.1).toFixed(2))))}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      </button>
                      <div style={styles.riLaborValue}>${laborRate.toFixed(2)}</div>
                      <button style={styles.osStepBtn} onClick={() => setLaborRate(r => parseFloat((r + 0.1).toFixed(2)))}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      </button>
                    </div>
                    <span style={styles.riLaborUnit}>/hr</span>
                  </div>

                  {/* Operation list */}
                  <div style={styles.riOpList}>
                    {defaultOps.map(op => {
                      const included = riIncluded[op.id] !== false;
                      const isRr = riRr[op.id] || false;
                      const time = riTimes[op.id] ?? op.time;
                      return (
                        <div key={op.id} style={styles.riOpCard}>
                          {/* Top row: full tappable include/exclude + R&R toggle */}
                          <div style={styles.riOpTopRow}>
                            <button onClick={() => toggleRiOp(op.id)}
                              style={{ ...styles.riOpToggleBtn, ...(included ? (isRr ? styles.riOpToggleBtnRr : styles.riOpToggleBtnOn) : {}) }}>
                              <div style={{ ...styles.riOpCheck, ...(included ? (isRr ? styles.riOpCheckRr : styles.riOpCheckOn) : {}) }}>
                                {included && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
                              </div>
                              <span style={{ ...styles.riOpLabel, ...(included ? {} : styles.riOpLabelOff) }}>
                                {op.name}
                              </span>
                              {!included && <span style={styles.riOpExcTag}>EXCL</span>}
                            </button>
                            {op.rrOption && included && (
                              <button onClick={() => toggleRiRr(op.id)}
                                style={{ ...styles.riRrBtn, ...(isRr ? styles.riRrBtnActive : {}) }}>
                                {isRr ? "R&R ✓" : "R&R"}
                              </button>
                            )}
                          </div>
                          {/* Bottom row: time controls when included */}
                          {included && (
                            <div style={styles.riOpBottomRow}>
                              <div style={styles.riOpTimeControls}>
                                <button style={styles.riTimeBtn} onClick={() => updateRiTime(op.id, -0.1)}>
                                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                </button>
                                <span style={styles.riTimeVal}>{time.toFixed(1)} hrs</span>
                                <button style={styles.riTimeBtn} onClick={() => updateRiTime(op.id, 0.1)}>
                                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                </button>
                              </div>
                              <span style={{ ...styles.riOpCost, ...(isRr ? { color: "#ef4444" } : {}) }}>${(time * laborRate).toFixed(2)}</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* R&I subtotal */}
                  <div style={styles.riSubtotal}>
                    <span>R&I Total ({riTotalHours.toFixed(1)} hrs × ${laborRate.toFixed(2)})</span>
                    <span style={styles.riSubtotalVal}>${riTotalCost.toFixed(2)}</span>
                  </div>
                </div>
              )}
            </>
          )}

          {/* Summary */}
          {((selectedRange && basePrice > 0 && !nonPdr) || (nonPdr && (rrCost > 0 || convCost > 0 || (riEnabled && riTotalCost > 0)))) && (
            <div style={styles.summaryBox}>
              {!nonPdr && (
                <div style={styles.summaryRow}>
                  <span>Base ({selectedRange} {DENT_SIZE_LABELS[size].toLowerCase()} dents)</span>
                  <span>${basePrice.toLocaleString()}</span>
                </div>
              )}
              {!nonPdr && addonBreakdown.filter(a => a.amount > 0).map(a => (
                <div key={a.name} style={styles.summaryRow}><span>{a.name}</span><span>+${a.amount.toLocaleString()}</span></div>
              ))}
              {rrEnabled && rrCost > 0 && (
                <div style={styles.summaryRow}><span>R&R ({rrHours.toFixed(1)} hrs)</span><span>${rrCost.toFixed(2)}</span></div>
              )}
              {convEnabled && convCost > 0 && (

            <button onClick={() => { onDelete(panel); onClose(); }} style={styles.deleteBtn}>Remove</button>
          )}
          <button onClick={() => { onSave(panel, { count: nonPdr ? 0 : count, selectedRange: nonPdr ? null : selectedRange, size, addons: nonPdr ? [] : addons, osDentCount, doubleOsCount, rrEnabled, rrHours, rrCost, convEnabled, convHours, convCost, basePrice: nonPdr ? 0 : basePrice, addonTotal: nonPdr ? 0 : addonTotal, riEnabled, laborRate, riTimes, riIncluded, riRr, riTotalHours, riTotalCost, totalPrice }); onClose(); }}

            {rrEnabled ? (totalPrice > 0 ? `Save R&R — $${totalPrice.toLocaleString()}` : "Save R&R") : convEnabled ? (totalPrice > 0 ? `Save Conv. — $${totalPrice.toLocaleString()}` : "Save Conv.") : !selectedRange ? "Select a damage range" : basePrice <= 0 ? "Select a valid size" : `Save — $${totalPrice.toLocaleString()}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CAMERA COMPONENT ───────────────────────────────────────────────────────
function CameraCapture({ photos, setPhotos }) {
  const inputRef = useRef(null);
  const handleCapture = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setPhotos(prev => [...prev, { url: ev.target.result, name: file.name, date: new Date().toLocaleString() }]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" multiple
        onChange={handleCapture} style={{ display: "none" }} />
      <button onClick={() => inputRef.current.click()} style={styles.cameraBtn}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
          <circle cx="12" cy="13" r="4" />
        </svg>
        <span>Capture Photo</span>
      </button>
      {photos.length > 0 && (
        <div style={styles.photoStrip}>
          {photos.map((p, i) => (
            <div key={i} style={styles.photoThumb}>
              <img src={p.url} alt={p.name} style={styles.photoImg} />

}

  const filtered = query
    ? items.filter(i => i.toLowerCase().includes(query.toLowerCase()))

  return (

        type="text"
        value={open ? query : value}

        onFocus={() => { setOpen(true); setQuery(""); }}

function decodeVIN(vin) {
  if (!vin || vin.length !== 17) return null;
  const v = vin.toUpperCase();
  
  // Year from position 10
  const yearCode = v[9];
  const year = VIN_YEAR_CODES[yearCode] || null;
  
  // Make from WMI (first 3 chars, then try first 2)
  const wmi3 = v.substring(0, 3);
  const wmi2 = v.substring(0, 2);
  let make = VIN_WMI_MAKES[wmi3] || null;
  if (!make) {
    // Try 2-char prefix match
    for (const [prefix, m] of Object.entries(VIN_WMI_MAKES)) {
      if (prefix.length === 2 && wmi2 === prefix) { make = m; break; }
      if (wmi3.startsWith(prefix)) { make = m; break; }
    }
  }
  
  return { year, make };
}

// ─── VIN SCANNER ────────────────────────────────────────────────────────────
function VinScanner({ onResult, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const scanIntervalRef = useRef(null);
  const [status, setStatus] = useState("starting"); // starting | scanning | captured | error | nosupport
  const [capturedVin, setCapturedVin] = useState("");
  const [manualEdit, setManualEdit] = useState(false);

  const stopCamera = () => {
    if (scanIntervalRef.current) clearInterval(scanIntervalRef.current);
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
  };

  const startCamera = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
      }
      setStatus("scanning");

      // Try BarcodeDetector API for live scanning
      if ("BarcodeDetector" in window) {
        try {
          const detector = new BarcodeDetector({ formats: ["code_39", "code_128"] });
          scanIntervalRef.current = setInterval(async () => {
            if (!videoRef.current || videoRef.current.readyState < 2) return;
            try {
              const barcodes = await detector.detect(videoRef.current);
              for (const bc of barcodes) {
                const raw = bc.rawValue.replace(/[^A-HJ-NPR-Z0-9]/gi, "").toUpperCase();
                if (raw.length === 17) {
                  stopCamera();
                  setCapturedVin(raw);
                  setStatus("captured");
                  return;
                }
              }
            } catch (e) {}
          }, 300);
        } catch (e) {
          // BarcodeDetector not supported for these formats
        }
      }
    } catch (e) {
      setStatus("error");
    }
  }, []);

  // Start camera on mount
  useState(() => {
    startCamera();
    return () => stopCamera();
  });

  const handleCapture = () => {
    if (!videoRef.current || !canvasRef.current) return;
    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    stopCamera();
    setStatus("captured");
    setManualEdit(true);
  };

  const handleClose = () => {
    stopCamera();
    onClose();
  };

  const handleConfirm = () => {
    const clean = capturedVin.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "").slice(0, 17);
    if (clean.length > 0) onResult(clean);
    else onClose();
  };

  return (
    <div style={styles.vinScanOverlay}>
      <style>{`@keyframes vinScanAnim { 0%,100%{ top:40% } 50%{ top:55% } }`}</style>
      <div style={styles.vinScanModal}>
        <div style={styles.vinScanHeader}>
          <div style={styles.vinScanTitle}>Scan VIN</div>
          <button onClick={handleClose} style={styles.vinScanClose}>✕</button>
        </div>

        {(status === "starting" || status === "scanning") && (
          <>
            <div style={styles.vinVideoWrap}>
              <video ref={videoRef} style={styles.vinVideo} playsInline muted />
              {/* Scan target overlay */}
              <div style={styles.vinScanTarget}>
                <div style={styles.vinScanTargetBox}>
                  <div style={styles.vinScanCorner1} />
                  <div style={styles.vinScanCorner2} />
                  <div style={styles.vinScanCorner3} />
                  <div style={styles.vinScanCorner4} />
                </div>
                <div style={styles.vinScanLabel}>
                  {status === "starting" ? "Starting camera..." : "Point at VIN barcode or plate"}
                </div>
              </div>
              {/* Scan line animation */}
              {status === "scanning" && <div style={styles.vinScanLine} />}
            </div>
            <div style={styles.vinScanActions}>
              <button onClick={handleCapture} style={styles.vinCaptureBtn}>
                <div style={styles.vinCaptureBtnInner} />
              </button>
              <div style={styles.vinScanHint}>
                Auto-scans barcodes • Tap button to capture manually
              </div>
            </div>
          </>
        )}

        {status === "captured" && (
          <div style={styles.vinCapturedWrap}>
            <div style={styles.vinCapturedIcon}>
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            {capturedVin && !manualEdit ? (
              <>
                <div style={styles.vinCapturedLabel}>VIN Detected</div>
                <div style={styles.vinCapturedValue}>{capturedVin}</div>
                <div style={styles.vinCapturedBtns}>
                  <button onClick={handleConfirm} style={styles.vinConfirmBtn}>Use This VIN</button>
                  <button onClick={() => setManualEdit(true)} style={styles.vinEditBtn}>Edit</button>
                </div>
              </>
            ) : (
              <>
                <div style={styles.vinCapturedLabel}>
                  {manualEdit ? "Type the VIN from the image" : "Enter VIN manually"}
                </div>
                <input value={capturedVin}
                  onChange={e => setCapturedVin(e.target.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "").slice(0, 17))}
                  style={styles.vinManualInput}
                  placeholder="Enter 17-character VIN"
                  maxLength={17} autoCapitalize="characters" autoFocus />
                <div style={styles.vinManualCount}>{capturedVin.length}/17</div>
                <div style={styles.vinCapturedBtns}>
                  <button onClick={handleConfirm} style={{ ...styles.vinConfirmBtn, opacity: capturedVin.length === 17 ? 1 : 0.4 }}
                    disabled={capturedVin.length !== 17}>
                    Confirm VIN
                  </button>
                  <button onClick={() => { setStatus("starting"); setCapturedVin(""); setManualEdit(false); startCamera(); }}
                    style={styles.vinEditBtn}>Rescan</button>
                </div>
              </>
            )}
          </div>
        )}

        {status === "error" && (
          <div style={styles.vinCapturedWrap}>
            <div style={{ ...styles.vinCapturedIcon, color: "#ef4444" }}>
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round">
                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            </div>
            <div style={styles.vinCapturedLabel}>Camera access denied</div>
            <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", marginBottom: 16 }}>
              Allow camera access in your browser settings, or enter VIN manually below.
            </div>
            <input value={capturedVin}
              onChange={e => setCapturedVin(e.target.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "").slice(0, 17))}
              style={styles.vinManualInput}
              placeholder="Enter 17-character VIN" maxLength={17} autoCapitalize="characters" autoFocus />
            <div style={styles.vinCapturedBtns}>
              <button onClick={handleConfirm} style={{ ...styles.vinConfirmBtn, opacity: capturedVin.length === 17 ? 1 : 0.4 }}
                disabled={capturedVin.length !== 17}>Confirm VIN</button>
            </div>
          </div>
        )}
      </div>
      <canvas ref={canvasRef} style={{ display: "none" }} />
    </div>
  );
}

// ─── VEHICLE FORM ───────────────────────────────────────────────────────────
function VehicleForm({ vehicleInfo, setVehicleInfo, onClose }) {
  const models = vehicleInfo.make ? (VEHICLE_DATA[vehicleInfo.make] || []) : [];
  const [vinStatus, setVinStatus] = useState(null);
  const [showVinScanner, setShowVinScanner] = useState(false); // null | "decoded" | "partial" | "invalid"

  const setField = (k, v) => {
    setVehicleInfo(prev => {
      const next = { ...prev, [k]: v };
      if (k === "make" && v !== prev.make) next.model = "";
      return next;
    });
  };

  const handleVinChange = (e) => {
    const raw = e.target.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "").slice(0, 17);
    setField("vin", raw);
    
    if (raw.length === 17) {
      const decoded = decodeVIN(raw);
      if (decoded && (decoded.year || decoded.make)) {
        setVehicleInfo(prev => {
          const next = { ...prev, vin: raw };
          if (decoded.year) next.year = decoded.year;
          if (decoded.make) {
            // Match to our make list (case-insensitive)
            const matchedMake = VEHICLE_MAKES.find(m => m.toLowerCase() === decoded.make.toLowerCase());
            if (matchedMake) {
              next.make = matchedMake;
              if (prev.make !== matchedMake) next.model = "";
            }
          }
          return next;
        });
        setVinStatus("decoded");
      } else {
        setVinStatus("partial");
      }
    } else if (raw.length > 0) {
      setVinStatus(null);
    } else {
      setVinStatus(null);
    }
  };

  return (
    <div style={styles.vehicleForm}>
      <div style={styles.vehicleFormTitle}>Vehicle / Claim Info</div>

      <div style={styles.vfGrid}>
        <div style={styles.vfField}>
          <label style={styles.vfLabel}>Owner Name</label>
          <input value={vehicleInfo.owner} onChange={e => setField("owner", e.target.value)}
            style={styles.vfInput} placeholder="Owner Name" />
        </div>
        <div style={styles.vfField}>
          <label style={styles.vfLabel}>Claim #</label>
          <input value={vehicleInfo.claim} onChange={e => setField("claim", e.target.value)}
            style={styles.vfInput} placeholder="Claim #" />
        </div>
      </div>

      {/* VIN with decoder + camera scan */}
      <div style={{ marginTop: 10, marginBottom: 10 }}>
        <label style={styles.vfLabel}>VIN</label>
        <div style={styles.vinRow}>
          <input value={vehicleInfo.vin} onChange={handleVinChange}
            style={{ ...styles.vfInput, ...styles.vinInput, ...(vinStatus === "decoded" ? styles.vinInputDecoded : {}) }}
            placeholder="Type or scan VIN" maxLength={17}
            autoCapitalize="characters" autoCorrect="off" spellCheck={false} />
          <div style={styles.vinCounter}>{vehicleInfo.vin.length}/17</div>
        </div>
        <div style={styles.vinActions}>
          <button onClick={() => setShowVinScanner(true)} style={styles.vinScanBtn}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
            Scan VIN with Camera
          </button>
          {vehicleInfo.vin.length > 0 && vehicleInfo.vin.length < 17 && (
            <div style={styles.vinHint}>{17 - vehicleInfo.vin.length} more characters needed</div>
          )}
        </div>
        {vinStatus === "decoded" && (
          <div style={styles.vinSuccess}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            VIN decoded — year &amp; make auto-filled
          </div>
        )}
        {vinStatus === "partial" && (
          <div style={styles.vinWarn}>VIN recognized but make not in database — fill manually</div>
        )}
      </div>

      {/* VIN Scanner Modal */}
      {showVinScanner && (
        <VinScanner
          onResult={(vin) => {
            handleVinChange({ target: { value: vin } });
            setShowVinScanner(false);
          }}
          onClose={() => setShowVinScanner(false)}
        />
      )}

      <div style={styles.vfGrid}>
        <div style={styles.vfField}>
          <label style={styles.vfLabel}>Year</label>
          <select value={vehicleInfo.year} onChange={e => setField("year", e.target.value)}
            style={styles.vfSelect}>
            <option value="">Year</option>
            {VEHICLE_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={styles.vfField}>
          <label style={styles.vfLabel}>Make</label>
          <SearchSelect items={VEHICLE_MAKES} value={vehicleInfo.make}
            onChange={v => setField("make", v)} placeholder="Search make..." />
        </div>
      </div>

      <div style={{ ...styles.vfGrid, gridTemplateColumns: "1fr", marginTop: 10 }}>
        <div style={styles.vfField}>
          <label style={styles.vfLabel}>Model</label>
          {vehicleInfo.make ? (
            <SearchSelect items={models} value={vehicleInfo.model}
              onChange={v => setField("model", v)} placeholder="Search model..." />
          ) : (
            <input style={{ ...styles.vfInput, opacity: 0.4 }} placeholder="Select make first" disabled />
          )}
        </div>
      </div>

      <button onClick={onClose} style={styles.vfDone}>Done</button>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function HailEstimator() {
  const [view, setView] = useState("estimate"); // estimate | review
  const [selectedPanel, setSelectedPanel] = useState(null);
  const [panelData, setPanelData] = useState({});
  const [photos, setPhotos] = useState([]);
  const [vehicleInfo, setVehicleInfo] = useState({ owner: "", year: "", make: "", model: "", vin: "", claim: "" });
  const [showVehicleForm, setShowVehicleForm] = useState(false);
  const [emailTo, setEmailTo] = useState("");
  const [showEmailDone, setShowEmailDone] = useState(false);

  const handleSavePanel = useCallback((panel, data) => {
    setPanelData(prev => ({ ...prev, [panel]: data }));
  }, []);

  const handleDeletePanel = useCallback((panel) => {
    setPanelData(prev => { const n = { ...prev }; delete n[panel]; return n; });
  }, []);

  const activePanels = Object.entries(panelData).filter(([, d]) => d.count > 0 || d.rrEnabled || d.convEnabled);
  const grandTotal = activePanels.reduce((s, [, d]) => s + d.totalPrice, 0);
  const totalDents = activePanels.reduce((s, [, d]) => s + ((d.rrEnabled || d.convEnabled) ? 0 : (d.count || 0)), 0);

  const handleDownloadReport = () => {
    const html = generateReportHTML(vehicleInfo, panelData, photos, grandTotal);
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `HailSpec_Estimate_${[vehicleInfo.year, vehicleInfo.make, vehicleInfo.model].filter(Boolean).join("_") || "Report"}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handlePrint = () => {
    const html = generateReportHTML(vehicleInfo, panelData, photos, grandTotal);
    try {
      // Try iframe print (works in most environments)
      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.top = "-10000px";
      iframe.style.left = "-10000px";
      iframe.style.width = "800px";
      iframe.style.height = "600px";
      document.body.appendChild(iframe);
      iframe.contentDocument.open();
      iframe.contentDocument.write(html);
      iframe.contentDocument.close();
      iframe.onload = () => {
        try {
          iframe.contentWindow.print();
        } catch (e) {
          // If print fails, fall back to download
          handleDownloadReport();
        }
        setTimeout(() => document.body.removeChild(iframe), 1000);
      };
      // Trigger load manually if already loaded
      setTimeout(() => {
        try { iframe.contentWindow.print(); } catch(e) {}
        setTimeout(() => {
          try { document.body.removeChild(iframe); } catch(e) {}
        }, 1000);
      }, 500);
    } catch (e) {
      // Final fallback: download the file
      handleDownloadReport();
    }
  };

  const handleEmail = () => {
    const subject = encodeURIComponent(`Hail Damage Estimate — ${[vehicleInfo.year, vehicleInfo.make, vehicleInfo.model].filter(Boolean).join(" ") || "Vehicle"} — $${grandTotal.toLocaleString()}`);
    const body = encodeURIComponent(
      `Hail Damage Estimate Summary\n\n` +
      `Owner: ${vehicleInfo.owner || "N/A"}\nVehicle: ${[vehicleInfo.year, vehicleInfo.make, vehicleInfo.model].filter(Boolean).join(" ") || "N/A"}\nVIN: ${vehicleInfo.vin || "N/A"}\nClaim #: ${vehicleInfo.claim || "N/A"}\n\n` +
      `Panels:\n` + activePanels.map(([k, d]) => `  ${PANEL_LABELS[k]}: ${d.rrEnabled ? "R&R" : d.convEnabled ? "Conv." : `${d.selectedRange || d.count} ${DENT_SIZE_LABELS[d.size].toLowerCase()} dents`} — $${d.totalPrice.toLocaleString()}`).join("\n") +
      `\n\nGRAND TOTAL: $${grandTotal.toLocaleString()}\n\n— Generated by HailSpec Estimator`
    );
    window.open(`mailto:${emailTo}?subject=${subject}&body=${body}`, "_self");
    setShowEmailDone(true);
    setTimeout(() => setShowEmailDone(false), 3000);
  };

  return (
    <div style={styles.app}>
      {/* ── HEADER ── */}

        <div style={styles.headerLeft}>
          <div style={styles.logo}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2.5">
              <circle cx="12" cy="12" r="10" /><path d="M12 8v4l3 3" />
            </svg>
            <span style={styles.logoText}>HailSpec</span>
          </div>
          <div style={styles.headerMeta}>State Farm Matrix</div>
        </div>
        <button onClick={() => setShowVehicleForm(v => !v)} style={styles.vehicleBtn}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <span style={styles.vehicleBtnLabel}>Customer</span>
        </button>
      </header>

      {/* Customer info preview bar */}
      {(vehicleInfo.owner || vehicleInfo.year || vehicleInfo.make) && !showVehicleForm && (
        <button onClick={() => setShowVehicleForm(true)} style={styles.customerBar}>
          <div style={styles.customerBarLeft}>

                  <button onClick={handlePrint} style={{ ...styles.exportBtn, flex: 1, marginBottom: 0 }}>

                      <polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" /><rect x="6" y="14" width="12" height="8" />
                    </svg>
                    <span>Print</span>
                  </button>
                  <button onClick={handleDownloadReport} style={{ ...styles.exportBtn, flex: 1, marginBottom: 0 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Download</span>
                  </button>
                </div>

                <div style={styles.emailRow}>
                  <input type="email" placeholder="recipient@email.com" value={emailTo}
                    onChange={e => setEmailTo(e.target.value)} style={styles.emailInput} />
                  <button onClick={handleEmail} disabled={!emailTo} style={{ ...styles.emailBtn, opacity: emailTo ? 1 : 0.4 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" />
                    </svg>
                    Email
                  </button>
                </div>
                {showEmailDone && <div style={styles.emailSuccess}>✓ Email client opened</div>}
              </div>

              {/* Photos in review */}
              {photos.length > 0 && (
                <div style={styles.section}>
                  <div style={styles.sectionLabel}>ATTACHED PHOTOS ({photos.length})</div>
                  <div style={styles.photoGrid}>
                    {photos.map((p, i) => (
                      <img key={i} src={p.url} alt={p.name} style={styles.reviewPhoto} />
                    ))}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── PANEL EDITOR MODAL ── */}
      {selectedPanel && (
        <PanelEditor panel={selectedPanel} data={panelData[selectedPanel]}
          onSave={handleSavePanel} onDelete={handleDeletePanel}
          onClose={() => setSelectedPanel(null)} />
      )}
    </div>
  );
}
