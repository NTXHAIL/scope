   id            uuid primary key default gen_random_uuid(),
   user_id       uuid references auth.users(id) on delete cascade not null,
   created_at    timestamptz default now(),
   updated_at    timestamptz default now(),

 alter table public.estimates enable row level security;

   using (auth.uid() = user_id)

// ─── AUTH MODAL ───────────────────────────────────────────────────────────────
function AuthModal({ onAuth, onClose }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");

  const handle = async () => {
    setLoading(true); setError(""); setSuccess("");
    try {
      if (mode === "reset") {
        const { error: e } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.href,
        });
        if (e) throw e;
        setSuccess("Password reset email sent — check your inbox.");
      } else if (mode === "signup") {
        const { data, error: e } = await supabase.auth.signUp({ email, password });
        if (e) throw e;
        // If email confirmation is disabled, signUp returns a session and user is logged in immediately.
        // If confirmation is required, no session yet — show the verification message.
        if (data?.session && data?.user) {
          onAuth(data.user);
        } else {
          setSuccess("Account created! Check your email to confirm, then log in.");
        }
      } else {
        const { data, error: e } = await supabase.auth.signInWithPassword({ email, password });
        if (e) throw e;
        onAuth(data.user);
      }
    } catch (e) {
      setError(e.message || "Something went wrong.");
    }
    setLoading(false);
  };

  const S = styles;
  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={{ ...S.modalContent, borderTop: "3px solid #2563eb" }} onClick={e => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalTitle}>{mode === "login" ? "Sign In" : mode === "signup" ? "Create Account" : "Reset Password"}</div>
            <div style={S.modalSubtitle}>HailSpec — NTX Hail Estimator</div>
          </div>
          <button onClick={onClose} style={S.closeBtn}>✕</button>
        </div>
        <div style={{ ...S.modalBody, paddingTop: 24 }}>
          {/* Mode tabs */}
          <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
            {["login","signup"].map(m => (
              <button key={m} onClick={() => { setMode(m); setError(""); setSuccess(""); }}
                style={{ flex:1, padding:"9px", borderRadius:8, border:"1.5px solid", fontSize:13, fontWeight:700, cursor:"pointer",
                  background: mode===m ? "#eff6ff" : "#f8fafc",
                  borderColor: mode===m ? "#3b82f6" : "#e2e8f0",
                  color: mode===m ? "#2563eb" : "#64748b" }}>
                {m === "login" ? "Sign In" : "Create Account"}
              </button>
            ))}
          </div>

          <label style={S.vfLabel}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)}
            style={{ ...S.vfInput, marginBottom: 12 }} placeholder="you@example.com" autoFocus />

          {mode !== "reset" && (
            <>
              <label style={S.vfLabel}>Password</label>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                style={{ ...S.vfInput, marginBottom: 4 }} placeholder="••••••••"
                onKeyDown={e => e.key === "Enter" && handle()} />
              {mode === "login" && (
                <button onClick={() => { setMode("reset"); setError(""); setSuccess(""); }}
                  style={{ background:"none", border:"none", color:"#3b82f6", fontSize:12, fontWeight:600, cursor:"pointer", padding:"6px 0", textAlign:"left" }}>
                  Forgot password?
                </button>
              )}
            </>
          )}

          {error   && <div style={{ marginTop:12, padding:"10px 14px", background:"#fef2f2", border:"1px solid #fecaca", borderRadius:8, color:"#dc2626", fontSize:13 }}>{error}</div>}
          {success && <div style={{ marginTop:12, padding:"10px 14px", background:"#f0fdf4", border:"1px solid #86efac", borderRadius:8, color:"#16a34a", fontSize:13 }}>{success}</div>}
        </div>
        <div style={S.modalFooter}>
          <button onClick={handle} disabled={loading || !email || (mode!=="reset" && !password)}
            style={{ ...S.saveBtn, opacity: (loading || !email || (mode!=="reset" && !password)) ? 0.5 : 1 }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign In" : mode === "signup" ? "Create Account" : "Send Reset Email"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── SAVED ESTIMATES LIST ─────────────────────────────────────────────────────
function SavedEstimatesList({ user, onLoad, onClose }) {
  const [estimates, setEstimates] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      const { data } = await supabase
        .from("estimates")
        .select("id, created_at, updated_at, vehicle_info, grand_total, carrier_id, panel_count")
        .eq("user_id", user.id)
        .order("updated_at", { ascending: false })
        .limit(50);
      setEstimates(data || []);
      setLoading(false);
    }
    load();
  }, [user.id]);

  const handleDelete = async (id) => {
    await supabase.from("estimates").delete().eq("id", id);
    setEstimates(prev => prev.filter(e => e.id !== id));
  };

  const S = styles;
  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={{ ...S.modalContent, borderTop: "3px solid #2563eb" }} onClick={e => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <div><div style={S.modalTitle}>Saved Estimates</div><div style={S.modalSubtitle}>{user.email}</div></div>
          <button onClick={onClose} style={S.closeBtn}>✕</button>
        </div>
        <div style={{ ...S.modalBody, paddingTop: 16 }}>
          {loading && <div style={{ textAlign:"center", color:"#94a3b8", padding:32 }}>Loading…</div>}
          {!loading && estimates.length === 0 && (
            <div style={{ textAlign:"center", color:"#94a3b8", padding:32 }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
              <div style={{ fontWeight:600 }}>No saved estimates yet</div>
              <div style={{ fontSize:13, marginTop:4 }}>Estimates auto-save as you build.</div>
            </div>
          )}
          {estimates.map(est => {
            const v = est.vehicle_info || {};
            const vehicle = [v.year, v.make, v.model].filter(Boolean).join(" ") || "No vehicle";
            const carrier = CARRIERS.find(c => c.id === est.carrier_id);
            const date = new Date(est.updated_at).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
            return (
              <div key={est.id} style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:"14px 16px", marginBottom:8, boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:"#0f172a" }}>{v.owner || "No owner"}</div>
                  <div style={{ fontWeight:800, fontSize:15, color:"#2563eb" }}>${(est.grand_total||0).toLocaleString()}</div>
                </div>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:10 }}>
                  {vehicle} {v.claim ? `• #${v.claim}` : ""} • {est.panel_count || 0} panels • {carrier?.label || "State Farm"} • {date}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => onLoad(est)} style={{ flex:1, background:"#2563eb", border:"none", borderRadius:8, padding:"9px", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>Load</button>
                  <button onClick={() => handleDelete(est.id)} style={{ background:"#fef2f2", border:"1px solid #fecaca", borderRadius:8, padding:"9px 14px", color:"#dc2626", fontSize:13, fontWeight:600, cursor:"pointer" }}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const DEFAULT_LABOR_RATE = 60;
const DENT_SIZES = ["DIME", "NICKEL", "QUARTER", "HALF"];
const DENT_SIZE_LABELS = { DIME: "Dime", NICKEL: "Nickel", QUARTER: "Quarter", HALF: "Half Dollar" };

function lookupPrice(panel, count, size) {
  if (!count || count <= 0) return 0;
  const rows = PRICING_MATRIX[panel];
  if (!rows) return 0;
  for (const row of rows) {
    if (count >= row.min && count <= row.max) return row[size] || 0;
  }
  return 0;
}

function getMaxCount(panel) {
  const rows = PRICING_MATRIX[panel];
  if (!rows || rows.length === 0) return 0;
  return rows[rows.length - 1].max;
}

function CarSilhouette({ panelData, selectedPanel, onSelectPanel }) {
  const panelPaths = {

    RFF:   { d: "M270,20 L320,35 L320,110 L270,125 Z", cx: 300, cy: 72 },
    LFD:   { d: "M95,118 L148,128 L148,250 L95,240 Z", cx: 118, cy: 184 },
    RFD:   { d: "M272,128 L325,118 L325,240 L272,250 Z", cx: 302, cy: 184 },
    LRAIL: { d: "M148,140 L175,140 L175,310 L148,310 Z", cx: 162, cy: 225 },
    RRAIL: { d: "M245,140 L272,140 L272,310 L245,310 Z", cx: 258, cy: 225 },
    ROOF:  { d: "M175,130 L245,130 L250,145 L250,300 L245,315 L175,315 L170,300 L170,145 Z", cx: 210, cy: 222 },
    LRD:   { d: "M95,248 L148,258 L148,370 L95,355 Z", cx: 118, cy: 310 },
    RRD:   { d: "M272,258 L325,248 L325,355 L272,370 Z", cx: 302, cy: 310 },
    LQ:    { d: "M100,362 L150,375 L150,430 L120,440 L100,430 Z", cx: 122, cy: 400 },
    RQ:    { d: "M270,375 L320,362 L320,430 L300,440 L270,430 Z", cx: 298, cy: 400 },
    TRUNK: { d: "M155,400 L265,400 L265,445 C265,460 255,470 240,475 L180,475 C165,470 155,460 155,445 Z", cx: 210, cy: 438 },
  };

  const getHeat = (panel) => {
    const d = panelData[panel];
    if (!d || !d.count || d.count <= 0) return 0;
    const max = getMaxCount(panel);
    return Math.min(d.count / (max || 50), 1);
  };

  const getColor = (panel) => {
    const d = panelData[panel];
    if (d && d.rrEnabled)   return "rgba(220,38,38,0.5)";
    if (d && d.convEnabled) return "rgba(249,115,22,0.5)";
    const heat = getHeat(panel);
    if (heat <= 0)    return "rgba(241,245,249,0.9)";
    if (heat < 0.25)  return "rgba(37,99,235,0.25)";
    if (heat < 0.5)   return "rgba(59,130,246,0.4)";
    if (heat < 0.75)  return "rgba(249,115,22,0.5)";
    return "rgba(220,38,38,0.6)";
  };

  return (
    <svg viewBox="60 0 300 490" style={{ width: "100%", maxWidth: 340, margin: "0 auto", display: "block" }}>
      <path d="M130,15 C160,5 260,5 290,15 L325,35 C340,60 340,80 335,110 L335,430 C335,455 320,475 290,480 L240,488 C225,490 195,490 180,488 L130,480 C100,475 85,455 85,430 L85,110 C80,80 80,60 95,35 Z"
        fill="none" stroke="#cbd5e1" strokeWidth="3.5" />
      <path d="M155,125 L265,125 L272,140 L272,150 L148,150 L148,140 Z" fill="rgba(219,234,254,0.6)" stroke="#bfdbfe" strokeWidth="1" />
      <path d="M155,375 L265,375 L268,390 L152,390 Z" fill="rgba(219,234,254,0.6)" stroke="#bfdbfe" strokeWidth="1" />
      {Object.entries(panelPaths).map(([key, { d, cx, cy }]) => {
        const isSelected = selectedPanel === key;
        const hasData = panelData[key] && (panelData[key].count > 0 || panelData[key].rrEnabled || panelData[key].convEnabled);
        return (
          <g key={key} onClick={() => onSelectPanel(key)} style={{ cursor: "pointer" }}>
            <path d={d}
              fill={getColor(key)}
              stroke={isSelected ? "#2563eb" : hasData ? "#1d4ed8" : "#e2e8f0"}
              strokeWidth={isSelected ? 2.5 : 1}
              style={{ transition: "all 0.2s" }}
            />
            {hasData && (
              <>
                <circle cx={cx} cy={cy} r={14} fill="rgba(15,23,42,0.85)" />
                <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="central"
                  fill={panelData[key].rrEnabled ? "#ef4444" : panelData[key].convEnabled ? "#f97316" : "#ffffff"}
                  fontSize={panelData[key].rrEnabled ? "8" : panelData[key].convEnabled ? "7" : "11"}
                  fontWeight="700" fontFamily="monospace">
                  {panelData[key].rrEnabled ? "R&R" : panelData[key].convEnabled ? "CONV" : panelData[key].count}
                </text>
              </>
            )}
            {!hasData && (
              <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                fill="rgba(148,163,184,0.6)" fontSize="8" fontWeight="500" fontFamily="sans-serif"
                style={{ pointerEvents: "none" }}>
                {key}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// ─── PANEL EDITOR MODAL ─────────────────────────────────────────────────────
function PanelEditor({ panel, data, onSave, onClose, onDelete, carrierId }) {
  const [selectedRange, setSelectedRange] = useState(data?.selectedRange || null);
  const [size, setSize] = useState(data?.size || "DIME");
  const [addons, setAddons] = useState(data?.addons || []);
  const [osDentCount, setOsDentCount] = useState(data?.osDentCount || 0);
  const [doubleOsCount, setDoubleOsCount] = useState(data?.doubleOsCount || 0);
  const [rrEnabled, setRrEnabled] = useState(data?.rrEnabled || false);
  const [rrHours, setRrHours] = useState(data?.rrHours ?? 0);
  const [convEnabled, setConvEnabled] = useState(data?.convEnabled || false);
  const [convHours, setConvHours] = useState(data?.convHours ?? 0);
  const [riEnabled, setRiEnabled] = useState(data?.riEnabled || false);
  const [laborRate, setLaborRate] = useState(data?.laborRate ?? DEFAULT_LABOR_RATE);

  const defaultOps = (RI_OPERATIONS[panel] || []);
  const initTimes = () => {
    const saved = data?.riTimes || {};
    const t = {};
    defaultOps.forEach(op => { t[op.id] = saved[op.id] ?? op.time; });
    return t;
  };
  const [riTimes, setRiTimes] = useState(initTimes);
  const [riIncluded, setRiIncluded] = useState(() => {
    if (data?.riIncluded) return data.riIncluded;
    const inc = {};
    defaultOps.forEach(op => { inc[op.id] = false; });
    return inc;
  });
  const [riRr, setRiRr] = useState(() => {
    if (data?.riRr) return data.riRr;
    const rr = {};
    defaultOps.forEach(op => { rr[op.id] = false; });
    return rr;
  });

  const updateRiTime = (id, delta) => {
    setRiTimes(prev => ({ ...prev, [id]: Math.max(0, parseFloat((prev[id] + delta).toFixed(1))) }));
  };
  const toggleRiOp = (id) => setRiIncluded(prev => ({ ...prev, [id]: !prev[id] }));
  const toggleRiRr = (id) => setRiRr(prev => ({ ...prev, [id]: !prev[id] }));

  const riTotalHours = riEnabled ? defaultOps.reduce((s, op) => s + (riIncluded[op.id] ? (riTimes[op.id] || 0) : 0), 0) : 0;
  const riTotalCost = Math.round(riTotalHours * laborRate * 100) / 100;

  const rows = getMatrix(carrierId || "state_farm")[panel] || [];
  const availableRanges = rows.filter(r => r.DIME > 0 || r.NICKEL > 0 || r.QUARTER > 0 || r.HALF > 0);
  const selectedRangeIdx = selectedRange ? availableRanges.findIndex(r => r.range === selectedRange) : -1;

  const toggleAddon = (name) => setAddons(prev => prev.includes(name) ? [] : [name]);

  const selectedRow = selectedRange ? rows.find(r => r.range === selectedRange) : null;
  const basePrice = selectedRow ? (selectedRow[size] || 0) : 0;
  const count = selectedRow ? selectedRow.max : 0;

  const availableSizes = DENT_SIZES.filter(s => {
    if (selectedRow) return selectedRow[s] > 0;
    return rows.some(r => r[s] > 0);
  });

  const addonBreakdown = addons.map(name => {
    const a = ADDONS.find(x => x.name === name);
    if (!a) return { name, amount: 0 };
    if (a.type === "dollar") {
      if (name === "Oversized Dent") return { name, amount: a.value * osDentCount };
      if (name === "Double OS Dents") return { name, amount: a.value * doubleOsCount };
      return { name, amount: a.value };
    }
    return { name, amount: Math.round(basePrice * a.value) };
  });
  const addonTotal = addonBreakdown.reduce((s, a) => s + a.amount, 0);
  const nonPdr = rrEnabled || convEnabled;
  const rrCost = rrEnabled ? Math.round(rrHours * laborRate * 100) / 100 : 0;
  const convCost = convEnabled ? Math.round(convHours * laborRate * 100) / 100 : 0;
  const pdrTotal = nonPdr ? 0 : (basePrice + addonTotal);
  const totalPrice = pdrTotal + rrCost + convCost + riTotalCost;

  const S = styles;

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={S.modalContent} onClick={e => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalTitle}>{PANEL_LABELS[panel]}</div>
            <div style={S.modalSubtitle}>{panel} • {availableRanges.length} damage ranges</div>
          </div>
          <button onClick={onClose} style={S.closeBtn}>✕</button>
        </div>

        <div style={S.modalBody}>
          {/* Repair Mode Toggles */}
          <div style={S.repairToggles}>
            <button onClick={() => { setRrEnabled(v => !v); if (!rrEnabled) setConvEnabled(false); }}
              style={{ ...S.repairToggleBtn, ...(rrEnabled ? S.repairToggleBtnRR : {}) }}>

                  <div style={S.riOpList}>

                        <div key={op.id} style={S.riOpCard}>

                              <button onClick={() => toggleRiRr(op.id)}

                              </button>
                            )}
                          </div>
                          {included && (
                            <div style={S.riOpBottomRow}>
                              <div style={S.riOpTimeControls}>
                                <button style={S.riTimeBtn} onClick={() => updateRiTime(op.id, -0.1)}>

                                </button>
                              </div>
                              <span style={{ ...S.riOpCost, ...(isRr ? { color: "#ef4444" } : {}) }}>${(time * laborRate).toFixed(2)}</span>

                  <div style={S.riSubtotal}>
                    <span>R&I Total ({riTotalHours.toFixed(1)} hrs × ${laborRate.toFixed(2)})</span>

                </div>

          )}

          {/* Summary */}
          {((selectedRange && basePrice > 0 && !nonPdr) || (nonPdr && (rrCost > 0 || convCost > 0 || (riEnabled && riTotalCost > 0)))) && (
            <div style={S.summaryBox}>

              {!nonPdr && addonBreakdown.filter(a => a.amount > 0).map(a => (
                <div key={a.name} style={S.summaryRow}><span>{a.name}</span><span>+${a.amount.toLocaleString()}</span></div>
              ))}
              {rrEnabled && rrCost > 0 && <div style={S.summaryRow}><span>R&R ({rrHours.toFixed(1)} hrs)</span><span>${rrCost.toFixed(2)}</span></div>}
              {convEnabled && convCost > 0 && <div style={S.summaryRow}><span>Conv. ({convHours.toFixed(1)} hrs)</span><span>${convCost.toFixed(2)}</span></div>}
              {riEnabled && riTotalCost > 0 && <div style={S.summaryRow}><span>R&I ({riTotalHours.toFixed(1)} hrs)</span><span>+${riTotalCost.toFixed(2)}</span></div>}
              <div style={S.summaryTotal}><span>Panel Total</span><span>${totalPrice.toLocaleString()}</span></div>
            </div>
          )}
        </div>

        <div style={S.modalFooter}>

            <button onClick={() => { onDelete(panel); onClose(); }} style={S.deleteBtn}>Remove</button>
          )}
          <button
            onClick={() => { onSave(panel, { count: nonPdr ? 0 : count, selectedRange: nonPdr ? null : selectedRange, size, addons: nonPdr ? [] : addons, osDentCount, doubleOsCount, rrEnabled, rrHours, rrCost, convEnabled, convHours, convCost, basePrice: nonPdr ? 0 : basePrice, addonTotal: nonPdr ? 0 : addonTotal, riEnabled, laborRate, riTimes, riIncluded, riRr, riTotalHours, riTotalCost, totalPrice }); onClose(); }}
            style={S.saveBtn}
            disabled={!nonPdr && (!selectedRange || basePrice <= 0)}>
            {rrEnabled ? (totalPrice > 0 ? `Save R&R — $${totalPrice.toLocaleString()}` : "Save R&R")
              : convEnabled ? (totalPrice > 0 ? `Save Conv. — $${totalPrice.toLocaleString()}` : "Save Conv.")
              : !selectedRange ? "Select a damage range"
              : basePrice <= 0 ? "Select a valid size"
              : `Save — $${totalPrice.toLocaleString()}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
function CameraCapture({ photos, setPhotos }) {
  const inputRef = useRef(null);
  const handleCapture = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => setPhotos(prev => [...prev, { url: ev.target.result, name: file.name, date: new Date().toLocaleString() }]);
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };
  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" multiple onChange={handleCapture} style={{ display: "none" }} />
      <button onClick={() => inputRef.current.click()} style={styles.cameraBtn}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Capture Photo</span>
      </button>
      {photos.length > 0 && (
        <div style={styles.photoStrip}>
          {photos.map((p, i) => (
            <div key={i} style={styles.photoThumb}>
              <img src={p.url} alt={p.name} style={styles.photoImg} />
              <button onClick={() => setPhotos(prev => prev.filter((_, j) => j !== i))} style={styles.photoRemove}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── REPORT HTML ─────────────────────────────────────────────────────────────
function generateReportHTML(vehicleInfo, panelData, photos, grandTotal, carrierLabel) {
  carrierLabel = carrierLabel || "State Farm";
  const date = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  const panels = Object.entries(panelData).filter(([, d]) => d.count > 0 || d.rrEnabled || d.convEnabled);
  let lineNum = 0, totalPrice = 0, totalLabor = 0;
  const allRows = panels.map(([key, d]) => {
    const np = d.rrEnabled || d.convEnabled;
    const rate = d.laborRate || DEFAULT_LABOR_RATE;
    let rows = `<tr class="${np && d.rrEnabled ? "section-row-rr" : "section-row"}"><td colspan="5">${PANEL_LABELS[key]}${d.rrEnabled ? " — R&R" : d.convEnabled ? " — Conv." : ""}</td></tr>`;
    if (np) {
      const mh = d.rrEnabled ? (d.rrHours || 0) : (d.convHours || 0);
      const mc = d.rrEnabled ? (d.rrCost || 0) : (d.convCost || 0);
      lineNum++; totalLabor += mc;
      rows += `<tr><td class="ln">${lineNum}</td><td>${d.rrEnabled ? "R&R — Remove & Replace" : "Conventional Repair"}</td><td>${mh.toFixed(1)} hrs</td><td></td><td class="amt">$${mc.toFixed(2)}</td></tr>`;
    } else {
      lineNum++; totalPrice += (d.basePrice || 0);
      rows += `<tr><td class="ln">${lineNum}</td><td>PDR — ${(d.selectedRange || d.count)} ${DENT_SIZE_LABELS[d.size].toLowerCase()} dents</td><td>1</td><td class="amt">$${(d.basePrice || 0).toLocaleString()}</td><td></td></tr>`;
      if (d.addons && d.addons.length > 0) {
        d.addons.forEach(name => {
          const a = ADDONS.find(x => x.name === name);
          if (!a) return;
          let addonAmt = 0, qty = "";
          if (a.type === "dollar") {
            if (name === "Oversized Dent") { qty = `${d.osDentCount || 0} × $${a.value}`; addonAmt = a.value * (d.osDentCount || 0); }
            else if (name === "Double OS Dents") { qty = `${d.doubleOsCount || 0} × $${a.value}`; addonAmt = a.value * (d.doubleOsCount || 0); }
            else { qty = "1"; addonAmt = a.value; }
          } else { qty = `${(a.value*100)}% of $${(d.basePrice||0).toLocaleString()}`; addonAmt = Math.round((d.basePrice||0) * a.value); }
          if (addonAmt > 0) { lineNum++; totalPrice += addonAmt; rows += `<tr class="addon-row"><td class="ln">${lineNum}</td><td>Add-on: ${name}</td><td>${qty}</td><td class="amt">$${addonAmt.toLocaleString()}</td><td></td></tr>`; }
        });
      }
    }
    if (d.riEnabled) {
      (RI_OPERATIONS[key] || []).filter(op => d.riIncluded && d.riIncluded[op.id]).forEach(op => {
        const time = (d.riTimes && d.riTimes[op.id] != null) ? d.riTimes[op.id] : op.time;
        const cost = Math.round(time * rate * 100) / 100;
        const isOpRr = d.riRr && d.riRr[op.id];
        lineNum++; totalLabor += cost;
        rows += `<tr class="${isOpRr ? "rr-labor-row" : "labor-row"}"><td class="ln">${lineNum}</td><td>${isOpRr ? "R&R" : "R&I"}: ${op.name}</td><td>${time.toFixed(1)} hrs @ $${rate.toFixed(2)}</td><td></td><td class="amt">$${cost.toFixed(2)}</td></tr>`;
      });
    }
    return rows;
  }).join("");

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>NTX Hail — Estimate</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;color:#1e293b;padding:40px;max-width:800px;margin:0 auto;font-size:13px}.header{border-bottom:3px solid #0a1628;padding-bottom:20px;margin-bottom:24px}.brand{display:flex;align-items:center;gap:10px}.brand-name{font-size:18px;font-weight:900;letter-spacing:1px;color:#0a1628}.brand-tag{font-size:11px;color:#2563eb;font-weight:700;letter-spacing:2px;text-transform:uppercase}.header p{color:#64748b;margin-top:4px;font-size:13px}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:24px;font-size:13px}.info-grid dt{color:#64748b;font-weight:500}.info-grid dd{font-weight:600}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#0a1628;color:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}td{padding:7px 10px;border-bottom:1px solid #e2e8f0;font-size:13px}.ln{width:36px;color:#94a3b8;font-weight:600;text-align:center;font-size:12px}.amt{text-align:right;font-weight:600;white-space:nowrap}.section-row td{background:#eff6ff;font-weight:800;font-size:13px;color:#1e3a5f;padding:8px 10px;border-bottom:2px solid #bfdbfe}.section-row-rr td{background:#fef2f2;font-weight:800;font-size:13px;color:#7f1d1d;padding:8px 10px;border-bottom:2px solid #fecaca}.addon-row td{color:#475569}.labor-row td{color:#1e293b}.rr-labor-row td{color:#dc2626}.subtotal-row td{border-top:2px solid #cbd5e1;font-weight:700;font-size:13px;padding:8px 10px}.total-row td{border-top:3px solid #0a1628;font-weight:800;font-size:15px;padding:10px}.total-row .amt{font-size:16px;color:#2563eb}.photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.photos img{width:150px;height:110px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0}.footer{margin-top:40px;padding-top:20px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;text-align:center}@media print{body{padding:20px}button{display:none}}</style>
</head><body>
<div class="header"><div class="brand"><div><div class="brand-name">NTX HAIL</div><div class="brand-tag">HailSpec Estimator</div></div></div><p>${carrierLabel} Matrix Pricing — ${date}</p></div>
<dl class="info-grid"><dt>Owner</dt><dd>${vehicleInfo.owner||"—"}</dd><dt>Vehicle</dt><dd>${[vehicleInfo.year,vehicleInfo.make,vehicleInfo.model].filter(Boolean).join(" ")||"—"}</dd><dt>VIN</dt><dd>${vehicleInfo.vin||"—"}</dd><dt>Claim #</dt><dd>${vehicleInfo.claim||"—"}</dd></dl>
<table><thead><tr><th style="width:36px">Line</th><th>Operation</th><th>Qty</th><th style="text-align:right">Price $</th><th style="text-align:right">Labor $</th></tr></thead>
<tbody>${allRows}<tr class="subtotal-row"><td></td><td colspan="2">Subtotals</td><td class="amt">$${totalPrice.toLocaleString()}</td><td class="amt">$${totalLabor.toFixed(2)}</td></tr>
<tr class="total-row"><td></td><td colspan="2">GRAND TOTAL</td><td colspan="2" class="amt">$${grandTotal.toLocaleString()}</td></tr></tbody></table>
${photos.length > 0 ? `<h3 style="margin-bottom:12px;font-size:14px">Documentation Photos</h3><div class="photos">${photos.map(p=>`<img src="${p.url}"/>`).join("")}</div>` : ""}
<div class="footer">Generated by HailSpec — NTX Hail | ntxhail.com — ${date}</div>
</body></html>`;
}

// ─── VIN DECODE ───────────────────────────────────────────────────────────────
const VIN_WMI_MAKES = { "1G1":"Chevrolet","1GC":"Chevrolet","1GT":"GMC","1G6":"Cadillac","1FA":"Ford","1FB":"Ford","1FC":"Ford","1FD":"Ford","1FM":"Ford","1FT":"Ford","1GK":"GMC","1HG":"Honda","1C3":"Chrysler","1C4":"Chrysler","1C6":"Ram","1D3":"Dodge","1D4":"Dodge","1D7":"Dodge","1J4":"Jeep","1J8":"Jeep","1LN":"Lincoln","1N4":"Nissan","1N6":"Nissan","1VW":"Volkswagen","1YV":"Mazda","2HG":"Honda","2HK":"Honda","2T1":"Toyota","2T2":"Lexus","3VW":"Volkswagen","4S3":"Subaru","4S4":"Subaru","4T1":"Toyota","4T3":"Toyota","4T4":"Toyota","5FN":"Honda","5J6":"Honda","5N1":"Nissan","5NP":"Hyundai","5NM":"Hyundai","5TD":"Toyota","5TF":"Toyota","5YJ":"Tesla","JA3":"Mitsubishi","JA4":"Mitsubishi","JF1":"Subaru","JF2":"Subaru","JH4":"Acura","JHM":"Honda","JM1":"Mazda","JM3":"Mazda","JN1":"Nissan","JN8":"Nissan","JT2":"Toyota","JT3":"Toyota","JTD":"Toyota","JTE":"Toyota","JTH":"Lexus","JTK":"Toyota","JTM":"Toyota","KM8":"Hyundai","KMH":"Hyundai","KNA":"Kia","KND":"Kia","WAU":"Audi","WA1":"Audi","WBA":"BMW","WBS":"BMW","WDB":"Mercedes-Benz","WDC":"Mercedes-Benz","WDD":"Mercedes-Benz","WMW":"Mini","WP0":"Porsche","WP1":"Porsche","WVW":"Volkswagen","YV1":"Volvo","YV4":"Volvo","ZAM":"Maserati","ZAR":"Alfa Romeo","19U":"Acura","19X":"Honda" };
const VIN_YEAR_CODES = { "A":"2010","B":"2011","C":"2012","D":"2013","E":"2014","F":"2015","G":"2016","H":"2017","J":"2018","K":"2019","L":"2020","M":"2021","N":"2022","P":"2023","R":"2024","S":"2025","T":"2026" };

function decodeVIN(vin) {
  if (!vin || vin.length !== 17) return null;
  const v = vin.toUpperCase();
  const year = VIN_YEAR_CODES[v[9]] || null;
  const wmi3 = v.substring(0, 3);
  let make = VIN_WMI_MAKES[wmi3] || null;
  if (!make) { for (const [p, m] of Object.entries(VIN_WMI_MAKES)) { if (wmi3.startsWith(p)) { make = m; break; } } }
  return { year, make };
}

// ─── VEHICLE FORM ─────────────────────────────────────────────────────────────
function VehicleForm({ vehicleInfo, setVehicleInfo, onClose }) {
  const models = vehicleInfo.make ? (VEHICLE_DATA[vehicleInfo.make] || []) : [];
  const [vinStatus, setVinStatus] = useState(null);
  const setField = (k, v) => setVehicleInfo(prev => { const next = { ...prev, [k]: v }; if (k === "make" && v !== prev.make) next.model = ""; return next; });

  const handleVinChange = (e) => {
    const raw = e.target.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "").slice(0, 17);
    setField("vin", raw);
    if (raw.length === 17) {
      const decoded = decodeVIN(raw);
      if (decoded && (decoded.year || decoded.make)) {
        setVehicleInfo(prev => {
          const next = { ...prev, vin: raw };
          if (decoded.year) next.year = decoded.year;
          if (decoded.make) { const m = VEHICLE_MAKES.find(x => x.toLowerCase() === decoded.make.toLowerCase()); if (m) { next.make = m; if (prev.make !== m) next.model = ""; } }
          return next;
        });
        setVinStatus("decoded");
      } else { setVinStatus("partial"); }
    } else { setVinStatus(null); }
  };

  return (
    <div style={styles.vehicleForm}>
      <div style={styles.vehicleFormTitle}>Vehicle / Claim Info</div>
      <div style={styles.vfGrid}>
        <div style={styles.vfField}><label style={styles.vfLabel}>Owner Name</label><input value={vehicleInfo.owner} onChange={e => setField("owner", e.target.value)} style={styles.vfInput} placeholder="Owner Name" /></div>
        <div style={styles.vfField}><label style={styles.vfLabel}>Claim #</label><input value={vehicleInfo.claim} onChange={e => setField("claim", e.target.value)} style={styles.vfInput} placeholder="Claim #" /></div>
      </div>
      <div style={{ marginTop: 10, marginBottom: 10 }}>
        <label style={styles.vfLabel}>VIN</label>
        <div style={styles.vinRow}>
          <input value={vehicleInfo.vin} onChange={handleVinChange}
            style={{ ...styles.vfInput, ...styles.vinInput, ...(vinStatus === "decoded" ? styles.vinInputDecoded : {}) }}
            placeholder="Enter 17-character VIN" maxLength={17} autoCapitalize="characters" autoCorrect="off" spellCheck={false} />
          <div style={styles.vinCounter}>{vehicleInfo.vin.length}/17</div>
        </div>
        {vinStatus === "decoded" && <div style={styles.vinSuccess}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg> VIN decoded — year & make auto-filled</div>}
        {vinStatus === "partial" && <div style={styles.vinWarn}>VIN recognized but make not in database — fill manually</div>}
      </div>
      <div style={styles.vfGrid}>
        <div style={styles.vfField}><label style={styles.vfLabel}>Year</label>
          <select value={vehicleInfo.year} onChange={e => setField("year", e.target.value)} style={styles.vfSelect}>
            <option value="">Year</option>
            {VEHICLE_YEARS.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={styles.vfField}><label style={styles.vfLabel}>Make</label><SearchSelect items={VEHICLE_MAKES} value={vehicleInfo.make} onChange={v => setField("make", v)} placeholder="Search make..." /></div>
      </div>
      <div style={{ ...styles.vfGrid, gridTemplateColumns: "1fr", marginTop: 10 }}>
        <div style={styles.vfField}><label style={styles.vfLabel}>Model</label>
          {vehicleInfo.make
            ? <SearchSelect items={models} value={vehicleInfo.model} onChange={v => setField("model", v)} placeholder="Search model..." />
            : <input style={{ ...styles.vfInput, opacity: 0.4 }} placeholder="Select make first" disabled />}
        </div>
      </div>
      <button onClick={onClose} style={styles.vfDone}>Done</button>
    </div>
  );
}

                    <div style={S.logMeta}>{d.rrEnabled?"R&R — Remove & Replace":d.convEnabled?"Conventional Repair":`${d.selectedRange||d.count} ${DENT_SIZE_LABELS[d.size].toLowerCase()} dents${(d.addons||[]).length>0?" • add-on":""}`}{d.riEnabled?" • R&I":""}</div>
                  </div>
                  <div style={S.logPrice}>${d.totalPrice.toLocaleString()}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {/* REVIEW VIEW */}
      {view==="review"&&(
        <div style={S.body}>
          {activePanels.length===0?(
            <div style={S.emptyState}>
              <div style={{fontSize:40,marginBottom:12}}>📋</div>
              <div style={{fontWeight:600,marginBottom:4}}>No panels estimated yet</div>
              <div style={{color:"#94a3b8",fontSize:14}}>Tap panels on the car diagram to begin.</div>
            </div>
          ):(
            <>
              <div style={S.reviewCard}>
                <div style={S.reviewHeader}>
                  <div>
                    <div style={S.reviewTitle}>Estimate Summary</div>
                    <div style={S.reviewMeta}>{vehicleInfo.year||vehicleInfo.make?`${vehicleInfo.year} ${vehicleInfo.make} ${vehicleInfo.model}`.trim():"No vehicle info"}{vehicleInfo.claim?` • #${vehicleInfo.claim}`:""}</div>
                    <div style={{marginTop:5,display:"inline-block",fontSize:11,fontWeight:700,color:activeCarrier.color,background:activeCarrier.color+"15",padding:"2px 9px",borderRadius:6,border:`1px solid ${activeCarrier.color}30`}}>{activeCarrier.label}</div>
                  </div>
                  <div style={S.grandTotal}>${grandTotal.toLocaleString()}</div>
                </div>
                <div style={S.reviewTable}>
                  <div style={S.rtHead}>
                    <span style={{flex:2}}>Panel</span><span style={{flex:1,textAlign:"center"}}>Dents</span>
                    <span style={{flex:1,textAlign:"center"}}>Size</span><span style={{flex:1,textAlign:"center"}}>R&I</span>
                    <span style={{flex:1,textAlign:"right"}}>Cost</span>
                  </div>
                  {activePanels.map(([key,d])=>{
                    const np=d.rrEnabled||d.convEnabled;
                    const ml=d.rrEnabled?"R&R":d.convEnabled?"Conv.":null;
                    const mc=d.rrEnabled?"#ef4444":d.convEnabled?"#f97316":undefined;
                    const mh=d.rrEnabled?d.rrHours:d.convEnabled?d.convHours:0;
                    return(<div key={key} style={S.rtRow}>
                      <span style={{flex:2,fontWeight:500}}>{PANEL_LABELS[key]}{np?" ✱":""}</span>
                      <span style={{flex:1,textAlign:"center",color:mc}}>{ml||(d.selectedRange||d.count)}</span>
                      <span style={{flex:1,textAlign:"center",fontSize:12}}>{np?`${(mh||0).toFixed(1)}hrs`:DENT_SIZE_LABELS[d.size]}</span>
                      <span style={{flex:1,textAlign:"center",fontSize:12,color:d.riEnabled?"#2563eb":"#94a3b8"}}>{d.riEnabled?`$${(d.riTotalCost||0).toFixed(0)}`:"—"}</span>
                      <span style={{flex:1,textAlign:"right",fontWeight:600}}>${d.totalPrice.toLocaleString()}</span>
                    </div>);
                  })}
                  <div style={S.rtTotal}>
                    <span style={{flex:2}}>Grand Total</span><span style={{flex:1,textAlign:"center"}}>{totalDents}</span>
                    <span style={{flex:1}}/><span style={{flex:1}}/>
                    <span style={{flex:1,textAlign:"right"}}>${grandTotal.toLocaleString()}</span>
                  </div>
                </div>
              </div>
              <div style={S.section}>
                <div style={S.sectionLabel}>EXPORT</div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <button onClick={handlePrint} style={{...S.exportBtn,flex:1,marginBottom:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Print
                  </button>
                  <button onClick={handleDownloadReport} style={{...S.exportBtn,flex:1,marginBottom:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                  </button>
                </div>
                <div style={S.emailRow}>
                  <input type="email" placeholder="recipient@email.com" value={emailTo} onChange={e=>setEmailTo(e.target.value)} style={S.emailInput}/>
                  <button onClick={handleEmail} disabled={!emailTo} style={{...S.emailBtn,opacity:emailTo?1:0.4}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Email
                  </button>
                </div>
                {showEmailDone&&<div style={S.emailSuccess}>✓ Email client opened</div>}
              </div>
              {photos.length>0&&(
                <div style={S.section}>
                  <div style={S.sectionLabel}>ATTACHED PHOTOS ({photos.length})</div>
                  <div style={S.photoGrid}>{photos.map((p,i)=><img key={i} src={p.url} alt={p.name} style={S.reviewPhoto}/>)}</div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {selectedPanel&&<PanelEditor panel={selectedPanel} data={panelData[selectedPanel]} carrierId={carrierId} onSave={handleSavePanel} onDelete={handleDeletePanel} onClose={()=>setSelectedPanel(null)}/>}
      {showAuth&&<AuthModal onAuth={u=>{setUser(u);setShowAuth(false);}} onClose={()=>setShowAuth(false)}/>}
      {showSaved&&user&&<SavedEstimatesList user={user} onLoad={handleLoadEstimate} onClose={()=>setShowSaved(false)}/>}
    </div>
  );
}
